syntax = "proto3";

package protobuf.pyi_test;

message KeywordOneof {
  oneof choice {
    string from = 1;
    string class = 2;
  }
}

message ShadowedOneof {
  string WhichOneof = 1;
  oneof action {
    string a = 2;
  }
}
