syntax = "proto2";

package proto2_wireformat_unittest;

option optimize_for = CODE_SIZE;

// A message with message_set_wire_format.
message TestMessageSetForCodesize {
  option message_set_wire_format = true;

  extensions 4 to 529999999;
}

message TestMessageSetForCodesizeExtension1 {
  extend TestMessageSetForCodesize {
    optional TestMessageSetForCodesizeExtension1 message_set_extension = 121314;
  }
  optional int32 i = 1;
}
