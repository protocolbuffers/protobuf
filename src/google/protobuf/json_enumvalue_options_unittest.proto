edition = "UNSTABLE";

package json_options_unittest;

import "google/protobuf/json_options.proto";

enum Armor {
  ARMOR_UNKNOWN = 0;
  ARMOR_GREAT_HELM = 1 [(pb.enumvalue.json).name = "gr8 helm"];
